# 静态片段：与 location / 分离，避免在模板里使用 $$ 内建变量。
# 勿默认强行 proxy_http_version 1.1 + Connection ""：与 uvicorn 组合时偶发 keep-alive 复用异常，表现为间歇 502/断连。
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
# 默认 1m 会导致头像/媒体直传 API 在 Nginx 层失败（浏览器侧常表现为 Network Error）
# 网盘式媒体直传（视频单文件可达数百 MB），需与 backend MAX_SIZE_BYTES 上大视频上限一致
client_max_body_size 520m;
