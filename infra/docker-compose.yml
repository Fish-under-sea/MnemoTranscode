# MTC 全栈架构 - Docker Compose 编排

services:
  # ========== 应用层 ==========

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mtc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mtc:mtc_password@postgres:5432/mtc_db
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      # 容器内连接 MinIO；预签名/浏览器用宿主机端口（与 ports 中 9000:9000 一致）
      - MINIO_ENDPOINT=minio:9000
      - MINIO_PUBLIC_ENDPOINT=localhost:9000
      # 仓库根下 kourichat/ 挂入，供 /api/v1/kourichat/start 找到 run_config_web.py
      - KOURICHAT_DIR=/kourichat
      - UVICORN_EXTRA_ARGS=--reload
    env_file:
      - ../backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - ../kourichat:/kourichat:ro
    networks:
      - mtc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mtc-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      # Nginx 反代到 backend 容器；若 API 在宿主机见 infra/docker-compose.hybrid-frontend.example.yml
      - API_UPSTREAM=backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mtc-network

  # ========== 数据库层 ==========

  postgres:
    image: postgres:16-alpine
    container_name: mtc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mtc
      POSTGRES_PASSWORD: mtc_password
      POSTGRES_DB: mtc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - mtc-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mtc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mtc-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ========== 向量数据库 ==========

  qdrant:
    image: qdrant/qdrant:latest
    container_name: mtc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - mtc-network
    # 官方镜像无 curl，用 bash 探测 REST 端口（/readyz 与 curl 等效目的）
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ========== 对象存储 ==========

  minio:
    image: minio/minio:latest
    container_name: mtc-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: mtc_access_key
      MINIO_ROOT_PASSWORD: mtc_secret_key
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - mtc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== Celery Worker（异步任务）==========#

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: mtc-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://mtc:mtc_password@postgres:5432/mtc_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    networks:
      - mtc-network

  # ========== 开发工具 ==========#

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mtc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mtc.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - mtc-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:

networks:
  mtc-network:
    driver: bridge
